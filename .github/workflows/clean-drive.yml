name: Manual Drive Cleanup - Rocadura

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-cleanup-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run Drive Fusion Cleanup
      env:
        GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      run: node scripts/cleanDriveRocadura.js

    - name: Commit Action Log
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add cleanup_log.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: save cleanup log output" && git push)
