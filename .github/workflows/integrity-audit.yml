name: "Data Integrity Audit - Stage 2"

on:
  workflow_dispatch: # Disparo manual

permissions:
  contents: read

jobs:
  run-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-node@v4
        # Nota: Usamos setup-python para scripts de Python
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib XlsxWriter tqdm

      - name: Run Integrity Audit Bot
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: python scripts/checkIntegrity.py

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Integrity-Report-Excel
          path: IntegrityReport.xlsx
          retention-days: 7
